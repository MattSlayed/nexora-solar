<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="'IBM Plex Sans',system-ui,sans-serif">
  <rect width="900" height="360" fill="#1B2A4E"/>
  <!-- Mark: stylised panel grid with rising sun + clean path -->
  <g transform="translate(120,110)">
    <!-- panel grid -->
    <g fill="none" stroke="#C9A227" stroke-width="1.4" opacity="0.55">
      <rect x="0" y="0" width="180" height="120" rx="3"/>
      <line x1="45" y1="0" x2="45" y2="120"/>
      <line x1="90" y1="0" x2="90" y2="120"/>
      <line x1="135" y1="0" x2="135" y2="120"/>
      <line x1="0" y1="60" x2="180" y2="60"/>
    </g>
    <!-- robot's clean path - swept line -->
    <path d="M 8 100 Q 50 30, 90 60 T 172 22" fill="none" stroke="#C9A227" stroke-width="4" stroke-linecap="round"/>
    <!-- sun rising at end of path -->
    <circle cx="190" cy="14" r="20" fill="#C9A227"/>
  </g>
  <!-- Wordmark - block sans, large -->
  <text x="380" y="170" font-size="108" font-weight="600" fill="#FFFEF9" letter-spacing="14">NEXORA</text>
  <!-- thin gold rule -->
  <line x1="382" y1="194" x2="822" y2="194" stroke="#C9A227" stroke-width="1"/>
  <!-- subtitle -->
  <text x="380" y="232" font-size="16" font-weight="400" fill="#C9A227" letter-spacing="8">CLEAN SOLAR · KEPT CLEAN</text>
</svg>
